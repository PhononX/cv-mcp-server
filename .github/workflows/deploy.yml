name: Complete CI/CD Pipeline (Test, Deploy & Release)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: us-east-2
  NODE_VERSION: '24'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run test:unit && npm run test:e2e
      - run: npm run build

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: development

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::336746746018:role/github-actions-cv-mcp-server-deploy
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - run: chmod +x iac/scripts/deploy-apprunner.sh

      - name: Deploy to App Runner development
        run: ./iac/scripts/deploy-apprunner.sh dev ${{ vars.APPRUNNER_SERVICE_NAME_DEV }}
        env:
          TRANSPORT_MODE: stateless

  check-version:
    name: Check Version Bump
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read

    outputs:
      version-changed: ${{ steps.version-check.outputs.changed }}
      new-version: ${{ steps.version-check.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - id: version-check
        run: |
          CURRENT_VERSION=$(jq -r .version package.json)
          git checkout HEAD~1
          PREVIOUS_VERSION=$(jq -r .version package.json)
          git checkout HEAD

          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  deploy-prod-and-publish:
    name: Deploy Production & Publish NPM
    runs-on: ubuntu-latest
    needs: [check-version]
    if: github.ref == 'refs/heads/main' && needs.check-version.outputs.version-changed == 'true'
    environment: production

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::336746746018:role/github-actions-cv-mcp-server-deploy
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build

      - run: chmod +x iac/scripts/deploy-apprunner.sh

      - name: Deploy to App Runner production
        run: ./iac/scripts/deploy-apprunner.sh prod ${{ vars.APPRUNNER_SERVICE_NAME_PROD }}
        env:
          TRANSPORT_MODE: stateless

      - name: Publish to NPM
        run: npm publish

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.check-version.outputs.new-version }}
          name: Release v${{ needs.check-version.outputs.new-version }}
          body: |
            🚀 **Carbon Voice v${{ needs.check-version.outputs.new-version }}**

            ✅ Deployed to production: https://${{ vars.APPRUNNER_SERVICE_NAME_PROD }}.us-east-2.awsapprunner.com
            ✅ Published to NPM: `npm install cv-mcp-server@${{ needs.check-version.outputs.new-version }}`

            Install via NPM:
            ```bash
            npm install cv-mcp-server@${{ needs.check-version.outputs.new-version }}
            ```
        env:
          GITHUB_TOKEN: ${{ github.token }}
